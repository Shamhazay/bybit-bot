<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --gold: #f0b90b;
            --bg-dark: #080a0c;
        }

        body {
            margin: 0; padding: 15px; height: 100vh;
            display: flex; flex-direction: column;
            /* Твой выбранный фон */
            background: var(--bg-dark) url('i.webp') no-repeat center center;
            background-size: cover;
            color: white; font-family: 'Inter', sans-serif;
            overflow: hidden; box-sizing: border-box;
        }

        /* Наложение для глубины и читаемости текста */
        .overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, rgba(8,10,12,0.2) 0%, rgba(8,10,12,0.8) 100%);
            z-index: 0;
        }

        #coin-canvas {
            position: absolute; top: 0; left: 0; z-index: 1;
            pointer-events: none;
        }

        .content {
            position: relative; z-index: 2;
            display: flex; flex-direction: column; height: 100%;
        }

        .header {
            text-align: center; padding-bottom: 10px;
            font-size: 11px; letter-spacing: 4px; color: var(--gold);
            text-transform: uppercase; font-weight: 900;
            opacity: 0.8;
        }

        .card {
            background: rgba(18, 20, 24, 0.75);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(240, 185, 11, 0.2);
            border-radius: 14px; padding: 20px; margin-bottom: 12px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.5);
        }

        .label { color: #848e9c; font-size: 10px; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 4px; }
        .value { font-size: 32px; font-weight: 800; letter-spacing: -0.5px; }

        .pos-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

        .controls { margin-top: auto; display: flex; flex-direction: column; gap: 10px; padding-bottom: 15px; }

        button {
            padding: 18px; border-radius: 12px; border: none;
            font-size: 14px; font-weight: 800; text-transform: uppercase;
            cursor: pointer; transition: 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .btn-run { background: #0ecb81; color: white; }
        .btn-pause { background: rgba(255, 255, 255, 0.05); color: #fff; border: 1px solid #474d57; }
        .btn-kill { background: #f6465d; color: white; }

        button:active { transform: scale(0.96); opacity: 0.9; }
    </style>
</head>
<body>
    <div class="overlay"></div>
    <canvas id="coin-canvas"></canvas>

    <div class="content">
        <div class="header">MM QUANT TERMINAL V4.2</div>

        <div class="card">
            <div class="label">Total Equity (USDT)</div>
            <div class="value">$166,885.20</div>
            <div style="color: #0ecb81; font-size: 12px; margin-top: 6px; font-weight: 700;">
                🟢 ПОДКЛЮЧЕНО К BYBIT | +0.24%
            </div>
        </div>

        <div class="pos-grid">
            <div class="card">
                <div class="label">Position</div>
                <div style="font-size: 18px; font-weight: 800; color: #f6465d;">SHORT BTC</div>
            </div>
            <div class="card">
                <div class="label">Open Size</div>
                <div style="font-size: 18px; font-weight: 800;">0.248 BTC</div>
            </div>
        </div>

        <div class="controls">
            <button class="btn-run" onclick="send('run')">▶ Launch Strategy</button>
            <button class="btn-pause" onclick="send('pause')">⏸ Hold System</button>
            <button class="btn-kill" onclick="send('kill')">🚨 Emergency Stop</button>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.setHeaderColor('#080a0c');

        function send(cmd) {
            tg.sendData(cmd);
            tg.HapticFeedback.notificationOccurred('success');
        }

        // Анимация частиц золота поверх твоего фона
        const canvas = document.getElementById('coin-canvas');
        const ctx = canvas.getContext('2d');
        let w, h;
        function init() { w = canvas.width = window.innerWidth; h = canvas.height = window.innerHeight; }
        window.onresize = init; init();

        const particles = Array.from({length: 25}, () => ({
            x: Math.random()*w, y: Math.random()*h,
            v: 0.2 + Math.random()*0.5, 
            s: Math.random()*2, opacity: 0.2 + Math.random()*0.5
        }));

        function draw() {
            ctx.clearRect(0, 0, w, h);
            particles.forEach(p => {
                ctx.fillStyle = `rgba(240, 185, 11, ${p.opacity})`;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.s, 0, Math.PI*2);
                ctx.fill();
                p.y -= p.v; if(p.y < -10) p.y = h + 10;
            });
            requestAnimationFrame(draw);
        }
        draw();
    </script>
</body>
</html>
