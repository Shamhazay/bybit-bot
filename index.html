<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { background: #080a0c; color: white; font-family: sans-serif; text-align: center; padding: 20px; margin: 0; }
        .btn { display: block; width: 100%; padding: 25px; margin: 10px 0; border-radius: 12px; border: none; color: white; font-weight: bold; font-size: 20px; cursor: pointer; text-transform: uppercase; }
        .run { background: #3498db; }
        .kill { background: #e74c3c; }
    </style>
</head>
<body>
    <h2>BYBIT MM TERMINAL</h2>
    <button class="btn run" onclick="send('run')">▶ Launch Strategy</button>
    <button class="btn kill" onclick="send('kill')">🚨 Emergency Stop</button>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();

        function send(cmd) {
            tg.sendData(cmd); // Отправляем команду в чат боту
            tg.close();       // Закрываем окно (важно для отправки)
        }
    </script>
</body>
</html>
