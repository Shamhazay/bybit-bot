<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { background: #080a0c; color: white; font-family: sans-serif; text-align: center; padding: 20px; }
        button { display: block; width: 100%; padding: 20px; margin: 10px 0; border-radius: 12px; border: none; font-size: 18px; font-weight: bold; cursor: pointer; }
        .run { background: #3498db; }
        .kill { background: #e74c3c; }
    </style>
</head>
<body>
    <h2>BYBIT CONTROL</h2>
    <button class="run" onclick="sendData('run')">LAUNCH</button>
    <button class="kill" onclick="sendData('kill')">STOP / KILL</button>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        function sendData(command) {
            tg.sendData(command); // Отправляет текст боту
            tg.close(); // Закрывает Mini App
        }
    </script>
</body>
</html>
