<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>С 8 Марта!</title>
    <style>
        body {
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #f8bbd0; /* Нежно-розовый фон как на фото */
            font-family: sans-serif;
        }
        .card {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 350px;
        }
        h1 { color: #880e4f; margin-bottom: 10px; }
        p { color: #ad1457; line-height: 1.5; font-size: 14px; }
    </style>
</head>
<body>
    <div class="card">
        <h1>8 Марта 🌷</h1>
        <p>Пусть весна расцветает не только на улице, но и в душе! Желаю бесконечного вдохновения, море улыбок и самых ярких моментов. Ты прекрасна!</p>
    </div>
</body>
</html>
