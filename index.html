<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script>
        // Инициализация
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready(); 

        function send(cmd) {
            // Пытаемся отправить данные боту
            try {
                tg.sendData(cmd); 
                tg.HapticFeedback.notificationOccurred('success');
                // Закрываем через полсекунды, чтобы команда успела улететь
                setTimeout(() => { tg.close(); }, 500);
            } catch (e) {
                alert("Ошибка отправки: " + e);
            }
        }
    </script>
    <style>
        body { background: #080a0c url('i.webp') no-repeat center; background-size: cover; color: white; font-family: sans-serif; text-align: center; display: flex; flex-direction: column; height: 100vh; justify-content: center; margin: 0; }
        .btn { padding: 20px; margin: 10px; border-radius: 12px; border: none; font-weight: bold; text-transform: uppercase; cursor: pointer; }
        .run { background: #3498db; }
        .kill { background: #ff4d4d; }
    </style>
</head>
<body>
    <h2>BYBIT MM TERMINAL</h2>
    <button class="btn run" onclick="send('run')">▶ Launch Strategy</button>
    <button class="btn" style="background: #333" onclick="send('pause')">⏸ Hold System</button>
    <button class="btn kill" onclick="send('kill')">🚨 Emergency Stop</button>
</body>
</html>
